<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Index-based Graph Viewer</title>
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base/layout-base.js"></script>
<script src="https://unpkg.com/cose-base/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
  <style>
    #cy { width: 100%; height: 600px; border: 1px solid #3d24e0cc; }
    #controls { margin-bottom: 10px; }
  </style>
</head>
<body>

<div id="controls">
  <label for="indexInput">index：</label>
  <input type="text" id="indexInput" />
  <button onclick="filterByEdgeIndex()">show related edges</button>
</div>

<div id="cy"></div>

<script>
let cy;
let componentMap = {}; // { compId: { nodes: Set, edges: Set, collapsed: false } }

fetch("graph.json")
  .then(res => res.json())
  .then(data => {
    cy = cytoscape({
      container: document.getElementById("cy"),
      elements: data,
      style: [
        {
          selector: "node",
          style: {
            "label": "data(id)",
            "background-color": "#0074D9",
            "color": "#fff",
            "text-valign": "center",
            "text-halign": "center",
            "width": 'label',
            "height": 'label',
            "padding": '10px',
            "font-size": '10px',
            "text-wrap":'wrap',
            "text-max-width": '100px'
          }
        },
        {
          selector: "edge",
          style: {
            "label": "data(index)",
            "width": 2,
            "line-color": "#aaa",
            "target-arrow-shape": "triangle",
            "target-arrow-color": "#aaa",
            "curve-style": "bezier",
            "font-size": 10,
            "text-rotation": "autorotate",
            "text-margin-y": -10
          }
        },
        {
          selector: ".hidden",
          style: {
            "display": "none"
          }
        }
      ],
      layout: { name: "fcose",   
      quality: "default",
      randomize: true, 
      animate: true,
      fit: true, 
      nodeDimensionsIncludeLabels: true,
      uniformNodeDimensions: false,
      packComponents: true,
      step: "all",
      samplingType: true,
      sampleSize: 25,
      nodeSeparation: 75,
  nodeRepulsion: node => 4500,
  idealEdgeLength: edge => 150,
  edgeElasticity: edge => 0.2,
  tile: true,
  tilingCompareBy: undefined, 
  tilingPaddingVertical: 10,
  gravity: 0.25,
  gravityRangeCompound: 1.5,
  gravityCompound: 1.0,
}
    });
    const components = cy.elements().components(); 
    components.forEach((comp, i) => {
      const compId = `group_${i}`;
      const nodes = comp.nodes();
      const edges = comp.edges();
      let rep = nodes[0];
      let maxDegree = rep.degree(false);
      nodes.forEach(n => {
        if (n.degree(false) > maxDegree) {
          rep = n;
          maxDegree = n.degree(false);
        }
      });

      rep.data('isRep', true);

      componentMap[compId] = {
        repId: rep.id(),
        nodes: new Set(nodes.map(n => n.id())),
        edges: new Set(edges.map(e => e.id())),
        collapsed: false
      };

      nodes.forEach(n => n.data('component', compId));
    });

    cy.on('tap', 'node', function (evt) {
      const node = evt.target;
      const compId = node.data('component');
      const group = componentMap[compId];
      if (!group) return;

      if (group.collapsed) {
        group.nodes.forEach(nid => {
          if (nid !== group.repId) cy.getElementById(nid).removeClass('hidden');
        });
        group.edges.forEach(eid => {
          cy.getElementById(eid).removeClass('hidden');
        });
        group.collapsed = false;
      } else {
        group.nodes.forEach(nid => {
          if (nid !== group.repId) cy.getElementById(nid).addClass('hidden');
        });
        group.edges.forEach(eid => {
          cy.getElementById(eid).addClass('hidden');
        });
        group.collapsed = true;
      }
    });
  });

function filterByEdgeIndex() {
  const input = document.getElementById("indexInput").value.trim();
  if (!input || !cy) return;
  const indices = input.split(", ").map(i => i.trim());
  cy.elements().addClass("hidden");
  const matchingEdges = cy.edges().filter(edge => edge.data("index").split(", ").map(i => i.trim().split('.')[0]).some(idx=>indices.includes(idx)));
  //const matchingEdges = cy.edges().filter(edge => indices.includes(edge.data("index")));
  matchingEdges.removeClass("hidden");
  matchingEdges.connectedNodes().removeClass("hidden");
}

function resetGraph() {
  if (!cy) return;
  cy.elements().removeClass("hidden");
  Object.values(componentMap).forEach(group => {
    group.collapsed = false;
  });
}

</script>

</body>
</html>
